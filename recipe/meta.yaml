{% set name = "pykerr" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pykerr-{{ version }}.tar.gz
  sha256: af5911697ccaa40b4abeb1d5920e7007bea0d123d18639403924aaba98ec954c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - h5py

test:
  imports:
    - pykerr
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/cdcapano/pykerr
  summary: QNM frequencies and spheroidal harmonics of Kerr black holes.
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - cdcapano
